baseURL: https://yinyu985.github.io/ # 绑定的域名
languageCode: zh-cn
title: Yinyu985's Blog
label: 
  text: ""
  icon: "https://github.com/yinyu985.png"
  iconHeight: 28
theme: papermod
enableInlineShortcodes: true
enableEmoji: true
enableRobotsTXT: true
hasCJKLanguage: true
buildDrafts: false
buildFuture: false
buildExpired: false
googleAnalytics: G-9W28F9LP0J
paginate: 10   
summaryLength: 800
permalinks:
  post: ":slug"
menu:
  main:
    # - identifier: home
    #   name: Home
    #   url: /
    #   weight: 1
    - identifier: tags
      name: Tags
      url: /tags
      weight: 5
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 20
    - identifier: post
      name: Post
      url: /post/
      weight: 2
    - identifier: search
      name: Search
      url: /search
      weight: 70
    - identifier: friend
      name: Friend
      url: /friend
      weight: 80
    - identifier: about
      name: About
      url: /about
      weight: 91

outputs:
  home:
    - HTML
    - RSS
    - JSON

fuseOpts:
  isCaseSensitive: false
  shouldSort: true
  location: 0
  distance: 1000
  threshold: 0.4
  minMatchCharLength: 0
  keys: [ "title", "permalink", "summary" ]

params:
  profileMode:
    enabled: true
    title: Keep Learning
    # subtitle: 子标题
    imageUrl: https://github.com/yinyu985.png
    imageTitle: 
    imageWidth: 200
    imageHeight: 200
    buttons:
      - name: Start
        url: post
  env: production
  description: ""
  defaultTheme: auto
  disableThemeToggle: false
  DateFormat: "2006-01-02"
  ShowShareButtons: false
  disableSpecialistPost: false
  displayFullLangName: false
  ShowPostNavLinks: true
  ShowLastMod: false
  ShowBreadCrumbs: false
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowWordCounts: true
  hideFooter: true
  VisitCount: true
  ShowToc: true
  TocOpen: true
  extendCodeBackground: false
  socialIcons:
    - name: github
      url: "https://github.com/yinyu985"
    - name: twitter
      url: "https://twitter.com/Erdeng10"
    - name: email
      url: "mailto:yinyu985@gmail.com"
    - name: RSS
      url: "index.xml"
  


  analytics:
    google:
      SiteVerificationTag: ""
  assets:
    favicon: "img/favicon.ico"
    favicon16x16: "img/favicon-16x16-next.png"
    favicon32x32: "img/favicon-32x32-next.png"
  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

taxonomies:
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    noClasses: true
    tabWidth: 4
    style: monokai